---
-name: "Show Me the Money"
 hosts: routers
 gather_facts: no
 connection: network_cli

 tasks:
  -name: Show Configuration Data
   ios_command:
    commands: 
    -show run
    -show ip interface brief
    -show version
    register: show_output

-name: Save the Output
 copy:
  content: "{{show_output.stdout[0]}}"
  dest: "backups/{{inventory_hostname}}-device_name-config.txt"
...  
